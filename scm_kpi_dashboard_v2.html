<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SCM KPI 대시보드 v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" integrity="sha384-JnoMdJvqvDpQtMXtSBFYGoEH7iXB/KSbTFTluANilJivmFJu8SaZiUlRRxhKhJj9" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;color:#1a1d23;font-size:13px;}
.hdr{background:#1a2744;color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px;}
.hdr h1{font-size:15px;font-weight:700;white-space:nowrap;}
.hdr-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.week-inp{background:#273557;border:1px solid #3d5080;color:#fff;padding:4px 8px;border-radius:5px;font-size:11px;font-family:inherit;min-width:110px;}
.btn{border:none;padding:5px 11px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-blue{background:#3b82f6;color:#fff;} .btn-blue:hover{background:#2563eb;}
.btn-green{background:#10b981;color:#fff;} .btn-green:hover{background:#059669;}
.btn-orange{background:#f59e0b;color:#fff;} .btn-orange:hover{background:#d97706;}
.badge-wk{background:#374151;color:#d1fae5;padding:3px 8px;border-radius:12px;font-size:10px;}
.tab-bar{background:#fff;border-bottom:2px solid #e5e7eb;display:flex;padding:0 16px;position:sticky;top:44px;z-index:90;overflow-x:auto;}
.tab{padding:9px 16px;font-size:12px;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:500;white-space:nowrap;}
.tab.active{color:#1a2744;border-bottom-color:#3b82f6;font-weight:700;}
.main{padding:14px;max-width:1280px;margin:0 auto;}
.panel{display:none;} .panel.active{display:block;}
.cards{display:grid;gap:10px;margin-bottom:12px;}
.c3{grid-template-columns:repeat(3,1fr);}
.c4{grid-template-columns:repeat(4,1fr);}
.c2{grid-template-columns:repeat(2,1fr);}
.card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:3px solid #e5e7eb;}
.card.blue{border-left-color:#3b82f6;} .card.green{border-left-color:#10b981;}
.card.orange{border-left-color:#f59e0b;} .card.red{border-left-color:#ef4444;}
.card.purple{border-left-color:#8b5cf6;} .card.teal{border-left-color:#14b8a6;}
.card-lbl{font-size:10px;color:#6b7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.card-val{font-size:22px;font-weight:700;color:#111827;}
.card-unit{font-size:11px;font-weight:400;color:#6b7280;margin-left:2px;}
.card-cmp{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
.cmp{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;}
.cmp.up{background:#fef2f2;color:#ef4444;}
.cmp.dn{background:#f0fdf4;color:#16a34a;}
.cmp.ne{background:#f9fafb;color:#6b7280;}
.sec{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px;}
.sec h3{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.sec h3::before{content:'';display:inline-block;width:3px;height:12px;background:#3b82f6;border-radius:2px;}
table.dt{width:100%;border-collapse:collapse;font-size:12px;}
table.dt thead tr{background:#f8fafc;}
table.dt th{padding:8px 10px;text-align:left;font-weight:600;color:#374151;border-bottom:2px solid #e5e7eb;white-space:nowrap;}
table.dt td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
table.dt tbody tr:hover{background:#fafafa;}
table.dt td.num{text-align:right;font-variant-numeric:tabular-nums;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.badge-A{background:#dcfce7;color:#15803d;}
.badge-B{background:#dbeafe;color:#1d4ed8;}
.badge-C{background:#fef3c7;color:#b45309;}
.badge-D{background:#fee2e2;color:#b91c1c;}
.badge-r{background:#fee2e2;color:#b91c1c;}
.badge-y{background:#fef3c7;color:#b45309;}
.badge-g{background:#dcfce7;color:#15803d;}
.badge-b{background:#dbeafe;color:#1d4ed8;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.chart-box{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.chart-box h3{font-size:12px;font-weight:700;color:#374151;margin-bottom:10px;}
.chart-box canvas{max-height:220px;}
.score-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;}
.score-bar{flex:1;background:#f3f4f6;border-radius:4px;height:8px;overflow:hidden;}
.score-fill{height:100%;border-radius:4px;background:#3b82f6;}
input.score-inp{width:48px;border:1px solid #d1d5db;border-radius:5px;padding:3px 6px;font-size:11px;text-align:center;}
.loading{text-align:center;padding:30px;color:#9ca3af;font-size:12px;}
.err-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;color:#dc2626;font-size:12px;margin-bottom:12px;display:none;}
.grade-badge{font-size:18px;font-weight:800;padding:4px 12px;border-radius:8px;}
.rank-num{font-weight:700;color:#374151;width:20px;text-align:right;}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;}
.prog-bar{flex:1;background:#f3f4f6;border-radius:4px;height:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;}
@media(max-width:700px){.c3,.c4{grid-template-columns:1fr 1fr;}.c2{grid-template-columns:1fr;}.row2{grid-template-columns:1fr;}}
/* 모달 레이아웃 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9999;}
.modal-overlay.active{display:flex;}
.modal-content{background:#fff;border-radius:12px;width:95%;max-width:1200px;height:85vh;display:flex;flex-direction:column;box-shadow:0 10px 25px rgba(0,0,0,0.2);overflow:hidden;animation:fadeIn 0.2s;}
.modal-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;}
.modal-header h2{font-size:16px;font-weight:700;color:#1e293b;margin:0;}
.modal-close{background:none;border:none;font-size:24px;color:#64748b;cursor:pointer;line-height:1;}
.modal-close:hover{color:#ef4444;}
.modal-body{padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;}
@keyframes fadeIn{from{opacity:0;transform:scale(0.98);}to{opacity:1;transform:scale(1);}}
.clickable{cursor:pointer;transition:transform 0.1s;}
.clickable:hover{transform:scale(1.02);box-shadow:0 4px 10px rgba(0,0,0,.15);z-index:2;position:relative;}
.td-clickable{cursor:pointer;text-decoration:underline;color:#2563eb;}
.td-clickable:hover{color:#1d4ed8;font-weight:600;}
</style>
</head>
<body>
<div class="hdr">
  <h1>📦 SCM KPI 대시보드 v2</h1>
  <div class="hdr-right">
    <label style="font-size:10px;color:#a0aec0;">기준 주차</label>
    <input class="week-inp" id="wkIn" type="text" placeholder="2026-W21">
    <button class="btn btn-blue" onclick="doLoad()">조회</button>
    <button class="btn btn-green" onclick="exportXLS()">📥 XLSX</button>
    <button class="btn btn-orange" onclick="exportMD()">📄 MD</button>
    <span class="badge-wk" id="wkLabel">—</span>
  </div>
</div>
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('order')">발주 KPI</div>
  <div class="tab" onclick="switchTab('issue')">이슈 KPI</div>
  <div class="tab" onclick="switchTab('cost')">원가율 분석</div>
  <div class="tab" onclick="switchTab('subcon')">하도급 관리</div>
  <div class="tab" onclick="switchTab('checkfinal')">체크파이널</div>
  <div class="tab" onclick="switchTab('supply')">공급망평가</div>
</div>
<div class="main">
  <div class="err-box" id="errBox"></div>
  <div id="panel-order" class="panel active"><div class="loading">주차를 입력하고 조회 버튼을 누르세요</div></div>
  <div id="panel-issue" class="panel"><div class="loading">주차를 입력하고 조회 버튼을 누르세요</div></div>
  <div id="panel-cost" class="panel"><div class="loading">주차를 입력하고 조회 버튼을 누르세요</div></div>
  <div id="panel-subcon" class="panel"><div class="loading">주차를 입력하고 조회 버튼을 누르세요</div></div>
  <div id="panel-checkfinal" class="panel"><div class="loading">주차를 입력하고 조회 버튼을 누르세요</div></div>
  <div id="panel-supply" class="panel"><div class="loading">공급망 평가 데이터를 로드 중입니다...</div></div>
</div>

<!-- 상세 조회 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">상세 내역</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" style="padding: 10px;">
      <div id="modalGridWrapper" style="width: 100%; height: 100%;"></div>
    </div>
  </div>
</div>

const fmtM = n => {
  if(!n || isNaN(n)) return '0';
  if(Math.abs(n)>=100000000) return (n/100000000).toFixed(1)+'억';
  if(Math.abs(n)>=10000) return (n/10000).toFixed(0)+'만';
  return n.toLocaleString();
};
const fmtN = n => (n||0).toLocaleString();
const fmtD = d => d ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}` : '';
const pct = (a,b) => b>0 ? (a/b*100).toFixed(1)+'%' : '—';

function getLV(obj) {
  if(obj===null||obj===undefined) return [];
  if(typeof obj==='boolean') return [obj];
  if(typeof obj==='number'||typeof obj==='string') return [obj];
  if(Array.isArray(obj)) return obj.map(o=>typeof o==='object'&&o!==null?o.name||o:o);
  if(obj.valuesByLinkedRecordId) return Object.values(obj.valuesByLinkedRecordId).flat();
  if(obj.name) return [obj.name];
  return [];
}
function getStr(obj) { const v=getLV(obj); return v.length?String(v[0]):''; }
function getNum(v) { return typeof v==='number'?v:parseFloat(v)||0; }

  const [y,w] = wk.split('-W').map(Number);
  const jan4 = new Date(y, 0, 4);
  const day = jan4.getDay() || 7;
  const start = new Date(jan4);
  start.setDate(jan4.getDate() - day + 1 + (w - 1) * 7);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  end.setHours(23,59,59,999);
  return {start, end};
}
function getISOWeek(d) {
  const dt = new Date(d);
  dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - (dt.getDay() + 6) % 7);
  const week1 = new Date(dt.getFullYear(), 0, 4);
  const w = 1 + Math.round(((dt.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  return `${dt.getFullYear()}-W${String(w).padStart(2,'0')}`;
}
function inRange(val, start, end) {
  if(!val) return false;
  const d = new Date(val);
  return d>=start && d<=end;
}
function prevWeek(wk) {
  const [y,w] = wk.split('-W').map(Number);
  if(w>1) return `${y}-W${String(w-1).padStart(2,'0')}`;
  return `${y-1}-W52`;
}
function yoyWeek(wk) {
  const [y,w] = wk.split('-W').map(Number);
  return `${y-1}-W${String(w).padStart(2,'0')}`;
}
function cmpBadge(cur, prev, label, isGoodDown=false) {
  if(prev===0||prev===null||prev===undefined) return `<span class="cmp ne">전${label} N/A</span>`;
  const d = ((cur-prev)/Math.abs(prev)*100);
  const up = d>0;
  const cls = isGoodDown ? (up?'up':'dn') : (up?'up':'dn');
  const arrow = up?'▲':'▼';
  return `<span class="cmp ${cls}">${arrow}${Math.abs(d).toFixed(1)}% vs 전${label}</span>`;
}
function partnerType(name) {
  const p = PARTNER_TYPES[name];
  if(!p) return {업태:'—',인쇄:'—',goods_category:'—',제조유형:'미분류'};
  return p;
}
function parsePartner(r) {
  let s = getStr(r[F.partnerName]) || getStr(r[F.partnerLink]);
  if (s && s.includes('발주 진행완료')) {
    s = s.replace(/발주 진행완료[\s\-\_]*/g, '').trim();
  }
  return s || '미지정';
}

// ──────────────────── Airtable API ────────────────────
async function fetchAll(base, tbl, fields, maxPages=2000, filterFormula=null, useId=true) {
  let rows=[], cursor=null;
  const pat = 'pat8jijwvKfAnYsxG.a5348b73d81c918e028acbd161bb2b2bde0b71a98ddfcfe25e062fe29d117b08';

  for(let i=0;i<maxPages;i++){
    const url = new URL(`https://api.airtable.com/v0/${base}/${tbl}`);
    url.searchParams.append('pageSize', '100');
    if(useId) url.searchParams.append('returnFieldsByFieldId', 'true');
    if(fields && useId) fields.forEach(f => url.searchParams.append('fields[]', f));
    if(filterFormula) url.searchParams.append('filterByFormula', filterFormula);
    if(cursor) url.searchParams.append('offset', cursor);

    try{
      const res = await fetch(url.toString(), {
        headers: { 'Authorization': `Bearer ${pat}` }
      });
      if (!res.ok) {
        if(res.status === 401) {
            throw new Error('Airtable PAT 인증 실패. 토큰을 확인해 주세요.');
        }
        throw new Error(`HTTP Error: ${res.status}`);
      }
      const data = await res.json();
      (data.records||[]).forEach(r=>rows.push({_id:r.id, ...(r.fields || {})}));
      cursor = data.offset;
      if(!cursor) break;
    }catch(e){
      console.error(e);
      throw e;
    }
  }
  return rows;
}

async function doLoad() {
  const wk = document.getElementById('wkIn').value.trim() || getISOWeek(new Date());
  state.week = wk;
  document.getElementById('wkIn').value = wk;
  const r = isoWeekRange(wk);
  document.getElementById('wkLabel').textContent =
    `${wk} (${fmtD(r.start)}~${fmtD(r.end)})`;

  ['order','issue','cost','subcon','checkfinal','supply'].forEach(t=>
    document.getElementById('panel-'+t).innerHTML='<div class="loading">데이터 수집 중 (2024-2026)…</div>');
  document.getElementById('errBox').style.display='none';

  try {
    // 2024-2026 데이터만 API 레벨에서 필터링하여 로딩 시간 최적화
    const [tasks, ordersRaw, parts, expenses] = await Promise.all([
      fetchAll(BASE_SERPA, TBL_TASK,    TASK_FLDS,    1000, "IS_AFTER({과업지시일자}, '2023-12-31')"),
      fetchAll(BASE_SERPA, TBL_ORDER,   null,         1000, "IS_AFTER({Created time}, '2023-12-31')", false),
      fetchAll(BASE_MRP,   TBL_PARTS,   PARTS_FLDS,   100),
      fetchAll(BASE_SERPA, TBL_EXPENSE, EXPENSE_FLDS, 200),
    ]);
    
    // 오더테이블 이름 기반 필드를 ID로 매핑 & 판매가 합계 계산 적용
    const orders = ordersRaw.map(r => {
      r[F.orderId] = r['order_id'] || r._id;
      r[F.goodsName] = r['goods (통합)'] || r['goods_통합'] || r[F.goodsName];
      r[F.salesQty] = r['주문수량'] || r[F.salesQty];
      r[F.salesAmt] = r['판매가 합계'] || (getNum(r['판매단가']) * getNum(r['주문수량'])) || r['매출 총액'] || r['매출총액'] || r[F.salesAmt];
      r[F.costOrder] = r['매출 원가'] || r['매출원가_order'] || r[F.costOrder];
      r[F.orderDate] = r['Created time'] || r['발주신청일'] || r[F.orderDate];
      r[F.orderStage] = r['발주단계'] || r[F.orderStage];
      return r;
    });

    // 2024.01.01 이후 필터
    const cutoff = new Date('2024-01-01');
    state.tasks    = tasks.filter(t=>new Date(t[F.taskDate]||'2000')>=cutoff);
    state.orders   = orders.filter(o=>new Date(o[F.orderDate]||'2000')>=cutoff);
    state.parts    = parts;
    state.expenses = expenses.filter(e=>e[F.expPayDate]);
    state.loaded   = true;
    renderAll(wk);
  } catch(e) {
    document.getElementById('errBox').style.display='block';
    document.getElementById('errBox').textContent='API 오류: '+e.message;
  }
}

// ──────────────────── 주차별 집계 헬퍼 ────────────────────
function weekSlice(arr, wk, dateField) {
  const r = isoWeekRange(wk);
  return arr.filter(x=>inRange(x[dateField], r.start, r.end));
}

}

function renderCostRate(wk) {
  // 마진율(전체)_DMK = fldTyDk8vSb62Pias, 판매가 = fldfjxi8TxujE0sGo, 원가 = fldVRhMtN8vUpeNUl
  // 원가율 = 1 - 마진율
  const allT = state.tasks;
  const curT  = weekSlice(allT, wk, F.taskDate);
  const pwk   = prevWeek(wk);
  const prevT = weekSlice(allT, pwk, F.taskDate);

  // 마진율 있는 레코드만
  const withMargin = t => getNum(t[F.marginRate]) !== 0 && t[F.marginRate] != null;
  const costRate   = t => 1 - getNum(t[F.marginRate]);
  const avgCR      = arr => { const v=arr.filter(withMargin); return v.length?v.reduce((s,t)=>s+costRate(t),0)/v.length:null; };

  const crCur  = avgCR(curT);
  const crPrev = avgCR(prevT);
  const crAll  = avgCR(allT);

  // 전체 기간 제품별 집계 (pna 코드 기준)
  const byPna = {};
  allT.forEach(t=>{
    const tid = t[F.taskName]||'';
    const pna = tid.split('_')[0]||tid;
    const nm  = tid.replace(/^PNA\d+_/,'').replace(/_[A-Z]\d+$/,'') || pna;
    if(!byPna[pna]) byPna[pna]={pna,nm,amt:0,qty:0,marginSum:0,marginCnt:0};
    byPna[pna].amt += getNum(t[F.supplyAmt]);
    byPna[pna].qty += getNum(t[F.orderQty]);
    if(withMargin(t)){ byPna[pna].marginSum+=costRate(t); byPna[pna].marginCnt++; }
  });
  // 매입금액 TOP 순 정렬
  const pnaAll = Object.values(byPna).filter(p=>p.amt>0).sort((a,b)=>b.amt-a.amt);
  const top30  = pnaAll.slice(0,30);
  // 원가율 위험 (마진율 있는 것 중 원가율 > 0.7)
  const risky  = pnaAll.filter(p=>p.marginCnt>0&&(p.marginSum/p.marginCnt)>0.7).sort((a,b)=>b.amt-a.amt).slice(0,15);
  // 고매출-저마진 (상위 매입액 중 원가율 높은 순)
  const highLow= top30.filter(p=>p.marginCnt>0).sort((a,b)=>(b.marginSum/b.marginCnt)-(a.marginSum/a.marginCnt)).slice(0,10);

  const fmtCR = v => v!=null?((v*100).toFixed(1)+'%'):'—';
  const crBadge = v => {
    if(v==null) return '<span class="badge badge-b">데이터없음</span>';
    if(v>0.7) return `<span class="badge badge-r">🔴${(v*100).toFixed(0)}%</span>`;
    if(v>0.5) return `<span class="badge badge-y">🟡${(v*100).toFixed(0)}%</span>`;
    return `<span class="badge badge-A">🟢${(v*100).toFixed(0)}%</span>`;
  };

  document.getElementById('panel-cost').innerHTML=`

  <div class="card ${crCur!=null&&crCur>0.7?'red':crCur!=null&&crCur>0.5?'orange':'green'}">
    <div class="card-lbl">주간 평균 원가율</div>
    <div class="card-val">${crCur!=null?(crCur*100).toFixed(1):'—'}<span class="card-unit">%</span></div>
    <div class="card-cmp"><span class="cmp ne">전주 ${crPrev!=null?(crPrev*100).toFixed(1)+'%':'—'}</span></div>
  </div>
  <div class="card blue">
    <div class="card-lbl">전체 평균 원가율 (2024~)</div>
    <div class="card-val">${crAll!=null?(crAll*100).toFixed(1):'—'}<span class="card-unit">%</span></div>
    <div class="card-cmp"><span class="cmp ne">마진율 있는 건 ${allT.filter(withMargin).length}건</span></div>
  </div>
  <div class="card red">

    <div class="card-val">${risky.length}<span class="card-unit">종</span></div>
    <div class="card-cmp"><span class="cmp ne">매입 상위 30종 기준</span></div>
  </div>

  <div class="sec">
    <h3>🔴 원가율 위험 품목 (원가율 &gt;70%, 매입금액 TOP)</h3>
    ${risky.length===0?'<p style="color:#10b981;font-size:12px;padding:8px 0;">✅ 위험 품목 없음</p>':`
    <table class="dt">
      <thead><tr><th>코드</th><th>품목명</th><th class="num">원가율</th><th class="num">매입액(전체)</th><th class="num">발주수량</th></tr></thead>
      <tbody>
      ${risky.map(p=>`<tr>

        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.nm}">${p.nm}</td>
        <td class="num">${crBadge(p.marginCnt>0?p.marginSum/p.marginCnt:null)}</td>

//  TAB 4: 하도급 관리 (v1.1 신규) — 90일 미지급 + 25/26년 추이
// ═══════════════════════════════════════════════════════
function renderSubcon(wk) {
  const today   = new Date();
  const cut90   = new Date(today); cut90.setDate(today.getDate()-90);

  // ── 90일 미지급 현황 ──
  // 과업지시일자 기준 90일 초과 + 지출결의 링크 없음 + 매입결산진행 ≠ 대상아님
  const unpaid = state.tasks.filter(t=>{
    const td = t[F.taskDate]; if(!td) return false;
    if(new Date(td) >= cut90) return false;                      // 90일 미경과
    const expLinks = t[F.expenseLink];
    const hasExp = expLinks && (Array.isArray(expLinks)?expLinks.length>0:(expLinks.linkedRecordIds&&expLinks.linkedRecordIds.length>0));
    if(hasExp) return false;                                     // 지출결의 있음 = 지급완료
    const billing = t['fldl2IxTwmFHnnicZ'];                     // 매입결산진행 (multipleSelects)
    const billingVals = getLV(billing);
    if(billingVals.some(v=>String(v).includes('대상아님'))) return false; // 제외
    return true;
  });

  // 담당자별 집계
  const byMgr = {};
  unpaid.forEach(t=>{
    const mgr = getLV(t[F.orderMgr])[0] || getLV(t[F.assignee])[0] || '미지정';
    if(!byMgr[mgr]) byMgr[mgr]={mgr,cnt:0,amt:0,oldest:null};
    byMgr[mgr].cnt++;
    byMgr[mgr].amt += getNum(t[F.supplyAmt]);
    const d=new Date(t[F.taskDate]);
    if(!byMgr[mgr].oldest||d<byMgr[mgr].oldest) byMgr[mgr].oldest=d;
  });
  const mgrList = Object.values(byMgr).sort((a,b)=>b.amt-a.amt);

  const totalUnpaid = unpaid.reduce((s,t)=>s+getNum(t[F.supplyAmt]),0);

  // 상위 20건 (오래된 순)
  const top20 = [...unpaid].sort((a,b)=>new Date(a[F.taskDate])-new Date(b[F.taskDate])).slice(0,20);

  // ── 25/26년 협력사별 월별 지출 추이 ──
  const exp25={}, exp26={};
  state.expenses.forEach(e=>{
    const pd = e[F.expPayDate]; if(!pd) return;
    const yr = new Date(pd).getFullYear();
    const mon = String(new Date(pd).getMonth()+1).padStart(2,'0');
    const vendor = getLV(e[F.expVendor])[0] || '미분류';
    const amt = getNum(e[F.expTotal]);
    if(yr===2025){ if(!exp25[vendor]) exp25[vendor]={}; exp25[vendor][mon]=(exp25[vendor][mon]||0)+amt; }
    if(yr===2026){ if(!exp26[vendor]) exp26[vendor]={}; exp26[vendor][mon]=(exp26[vendor][mon]||0)+amt; }
  });
  // 전체 vendor 목록 (25/26 합산 TOP 20)
  const vendorTotals = {};
  [...Object.keys(exp25),...Object.keys(exp26)].forEach(v=>{
    if(!vendorTotals[v]) vendorTotals[v]=0;
    vendorTotals[v]+=(Object.values(exp25[v]||{}).reduce((s,x)=>s+x,0)+Object.values(exp26[v]||{}).reduce((s,x)=>s+x,0));
  });
  const topVendors = Object.entries(vendorTotals).sort((a,b)=>b[1]-a[1]).slice(0,15).map(x=>x[0]);
  const months25=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const months26=['01','02','03','04','05'];

  document.getElementById('panel-subcon').innerHTML=`
<div class="cards c3">
  <div class="card red">
    <div class="card-lbl">⚖️ 하도급 90일 초과 미지급</div>
    <div class="card-val">${unpaid.length}<span class="card-unit">건</span></div>
    <div class="card-cmp"><span class="cmp ne">기산일: 과업지시일자 기준</span></div>
  </div>
  <div class="card orange">
    <div class="card-lbl">미지급 총액 (공급가액 기준)</div>
    <div class="card-val">${fmtM(totalUnpaid)}<span class="card-unit">원</span></div>
    <div class="card-cmp"><span class="cmp ne">지출결의 미연결 건 합계</span></div>
  </div>
  <div class="card blue">
    <div class="card-lbl">담당자 수</div>
    <div class="card-val">${mgrList.length}<span class="card-unit">명</span></div>
    <div class="card-cmp"><span class="cmp ne">미지급 건 발생 담당자</span></div>
  </div>
</div>

<div class="row2">
  <div class="sec">
    <h3>⚠️ 담당자별 90일 미지급 현황</h3>
    ${mgrList.length===0?'<p style="color:#10b981;font-size:12px;padding:8px 0;">✅ 90일 초과 미지급 없음</p>':`
    <table class="dt">
      <thead><tr><th>담당자</th><th class="num">건수</th><th class="num">금액</th><th>최오래된 기산일</th></tr></thead>
      <tbody>
      ${mgrList.map(m=>`<tr>
        <td>${m.mgr}</td>
        <td class="num"><span class="badge badge-r">${m.cnt}건</span></td>
        <td class="num">${fmtM(m.amt)}</td>
        <td style="font-size:11px;">${m.oldest?fmtD(m.oldest):'—'}</td>
      </tr>`).join('')}
      </tbody>
    </table>`}
  </div>
  <div class="sec">
    <h3>90일 초과 상위 20건 (오래된 순)</h3>
    ${top20.length===0?'<p style="color:#10b981;font-size:12px;padding:8px 0;">✅ 없음</p>':`
    <table class="dt">
      <thead><tr><th>과업지시일</th><th>협력사</th><th>품목</th><th class="num">금액</th><th class="num">경과일</th></tr></thead>
      <tbody>
      ${top20.map(t=>{
        const td=t[F.taskDate]||'';
        const elapsed=td?Math.round((today-new Date(td))/86400000):0;
        const nm=(t[F.taskName]||'').replace(/^PNA\d+_/,'').replace(/_[A-Z]\d+$/,'').slice(0,20);
        return `<tr>
          <td style="font-size:11px;">${td}</td>
          <td style="font-size:11px;max-width:80px;overflow:hidden;text-overflow:ellipsis;">${getStr(t[F.partnerName])||'—'}</td>
          <td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;" title="${nm}">${nm}</td>
          <td class="num">${fmtM(getNum(t[F.supplyAmt]))}</td>
          <td class="num"><span class="badge ${elapsed>=180?'badge-r':elapsed>=90?'badge-y':'badge-g'}">${elapsed}일</span></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`}
  </div>
</div>

<div class="sec">
  <h3>협력사별 월별 매입액 추이 (25년 vs 26년, TOP 15 협력사)</h3>
  ${topVendors.length===0?'<p style="color:#9ca3af;font-size:12px;padding:8px 0;">지출결의 데이터 없음</p>':`
  <div style="overflow-x:auto;">
  <table class="dt">
    <thead>
      <tr>
        <th rowspan="2">협력사</th>
        <th colspan="${months25.length}" style="text-align:center;background:#dbeafe;color:#1e40af;">2025년 (월별)</th>
        <th colspan="${months26.length}" style="text-align:center;background:#dcfce7;color:#15803d;">2026년 YTD</th>
        <th class="num" rowspan="2">25년 합계</th>
        <th class="num" rowspan="2">26년 합계</th>
      </tr>
      <tr>
        ${months25.map(m=>`<th class="num" style="font-size:9px;background:#eff6ff;">${m}월</th>`).join('')}
        ${months26.map(m=>`<th class="num" style="font-size:9px;background:#f0fdf4;">${m}월</th>`).join('')}
      </tr>
    </thead>
    <tbody>
    ${topVendors.map(v=>{
      const tot25=Object.values(exp25[v]||{}).reduce((s,x)=>s+x,0);
      const tot26=Object.values(exp26[v]||{}).reduce((s,x)=>s+x,0);
      const diff=tot25>0?((tot26-tot25)/tot25*100).toFixed(0):null;
      return `<tr>
        <td style="white-space:nowrap;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;" title="${v}">${v}</td>
        ${months25.map(m=>`<td class="num" style="font-size:10px;">${(exp25[v]||{})[m]?fmtM((exp25[v]||{})[m]):'—'}</td>`).join('')}
        ${months26.map(m=>`<td class="num" style="font-size:10px;">${(exp26[v]||{})[m]?fmtM((exp26[v]||{})[m]):'—'}</td>`).join('')}
        <td class="num">${fmtM(tot25)}</td>
        <td class="num">${fmtM(tot26)}${diff!==null?` <span style="font-size:9px;color:${parseFloat(diff)>=0?'#dc2626':'#16a34a'};">(${parseFloat(diff)>=0?'+':''}${diff}%)</span>`:''}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  </div>`}
</div>`;
}

function renderCheckFinal(wk) {
  const pwk=prevWeek(wk), ywk=yoyWeek(wk);
  // 체크파이널 데이터는 현재 project 테이블 타임아웃으로 인해
  // 차주에 movement/project 연동 후 자동 표시됩니다.
  // 임시: task 기준으로 미입하건 중 재제작 발생을 체크파이널 대리 지표로 표시
  const cur  = weekSlice(state.tasks, wk,  F.taskDate);
  const prev = weekSlice(state.tasks, pwk, F.taskDate);
  const yoy  = weekSlice(state.tasks, ywk, F.taskDate);

  const bespoke   = r=>{const v=getLV(r[F.bespoke]);return v.some(s=>s&&String(s)!=='0'&&String(s)!=='false');};
  const besC=cur.filter(bespoke).length, besP=prev.filter(bespoke).length, besY=yoy.filter(bespoke).length;

  // 최근 8주 추이
  const [yr,wn]=wk.split('-W').map(Number);
  const weeks8=[];
  for(let i=7;i>=0;i--){let w2=wn-i,y2=yr;if(w2<=0){y2--;w2+=52;}weeks8.push(`${y2}-W${String(w2).padStart(2,'0')}`);}
  const trendData=weeks8.map(w2=>{
    const sl=weekSlice(state.tasks,w2,F.taskDate);
    const isRework=r=>{const v=r[F.rework];return v&&v.name&&v.name!=='-'&&v.name!=='없음';};
    return {wk:w2,total:sl.length,rework:sl.filter(isRework).length,bespoke:sl.filter(bespoke).length};
  });

    <div class="card-lbl">비스포크 건수</div>
    <div class="card-val">${besC}<span class="card-unit">건</span></div>
    <div class="card-cmp">${cmpBadge(besC,besP,'주',true)}${cmpBadge(besC,besY,'년동주',true)}</div>
  </div>
  <div class="card orange clickable" onclick="showTaskModal('비스포크 발생 비율', 'cur', 'bespoke')">

// ═══════════════════════════════════════════════════════
//  TAB 4: 공급망평가 KPI
// ═══════════════════════════════════════════════════════
function renderSupply(wk) {
  // 연간 기준: 최근 52주 (2025-01-01 이후 전체 사용)
  const allTasks  = state.tasks;
  const isUninput = r=>{const v=r[F.uninput];return v&&v.linkedRecordIds&&v.linkedRecordIds.length>0;};

  // 협력사별 연간 집계
  const annual={};
  allTasks.forEach(r=>{
    const nm=getStr(r[F.partnerName])||'미지정';
    if(nm==='미지정') return;
    if(!annual[nm]) annual[nm]={name:nm,taskCnt:0,expAmt:0,uninputCnt:0,totalCnt:0};
    annual[nm].taskCnt++;
    annual[nm].expAmt+=getNum(r[F.expense]);
    annual[nm].totalCnt++;
    if(isUninput(r)) annual[nm].uninputCnt++;
  });

  // 점수 계산
  const score=[];
  Object.values(annual).filter(p=>p.taskCnt>0).forEach(p=>{
    // TASK 점수 (3점, 연간)
    const tScore = p.taskCnt>=400?3:p.taskCnt>=100?2:p.taskCnt>=11?1:0;
    // 매입대금 점수 (3점, 연간)
    const aScore = p.expAmt>=100000000?3:p.expAmt>=50000000?2:p.expAmt>=1?1:0;
    // 납기·이슈 점수 (3점) — 미입하율 기준 (이슈율은 movement 필요)
    const uninputRate = p.totalCnt>0?p.uninputCnt/p.totalCnt:0;
    const dScore = uninputRate<0.05?3:uninputRate<0.20?2:1;
    // 예외사항·대체가능 → localStorage 저장값
    const excKey='scm_exc_'+p.name, altKey='scm_alt_'+p.name;
    const excScore = parseInt(localStorage.getItem(excKey)||'1');
    const altScore = parseInt(localStorage.getItem(altKey)||'2');
    const total = tScore+aScore+dScore+excScore+altScore;
    const grade = total>=12?'A':total>=6?'B':total>=3?'C':'D';
    const pt = partnerType(p.name);
    score.push({...p, tScore, aScore, dScore, excScore, altScore, total, grade, pt});
  });
  score.sort((a,b)=>b.total-a.total);

  const gradeCnt={A:0,B:0,C:0,D:0};
  score.forEach(s=>gradeCnt[s.grade]=(gradeCnt[s.grade]||0)+1);
  const risky = score.filter(s=>s.grade==='D');

  document.getElementById('panel-supply').innerHTML=`
<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#1e40af;">
  📌 점수 기준: TASK(3) + 매입대금(3) + 납기·이슈(3) + 예외사항(3, 정성) + 대체가능(3, 정성) = 총 15점<br>
  A≥12 / B 6~11 / C 3~5 / D 0~2 | 미입하율을 납기·이슈 점수로 대용 (이슈율은 movement 연동 시 반영). 예외/대체 점수는 직접 입력.
</div>
<div class="cards c4">
  <div class="card green"><div class="card-lbl">A등급 협력사</div><div class="card-val">${gradeCnt.A||0}<span class="card-unit">사</span></div></div>

// ──────────────────── XLSX 내보내기 ────────────────────
function exportXLS() {
  if(!state.loaded){alert('먼저 조회를 실행하세요.');return;}
  const wk = state.week;
  const r = isoWeekRange(wk);
  const pwk = prevWeek(wk), ywk = yoyWeek(wk);
  const curT  = weekSlice(state.tasks,  wk,  F.taskDate);
  const curO  = weekSlice(state.orders, wk,  F.orderDate);
  const prevT = weekSlice(state.tasks,  pwk, F.taskDate);
  const yoyT  = weekSlice(state.tasks,  ywk, F.taskDate);

  const isUninput = r=>{const v=r[F.uninput];return v&&v.linkedRecordIds&&v.linkedRecordIds.length>0;};

  // Sheet 1: 발주 raw
  const s1rows=[['주차','협력사','업태','제조유형','담당자','과업지시일자','발주지시수량','총지출액VAT','공급가액','취득원가','긴급여부','미입하여부','재제작구분','Goods Category']];
  curT.forEach(t=>{
    const pt=partnerType(getStr(t[F.partnerName])||'');
    s1rows.push([
      wk, getStr(t[F.partnerName])||'미지정', pt.업태||'', pt.제조유형||'',
      getStr(t[F.assignee])||'', t[F.taskDate]||'',
      getNum(t[F.orderQty]), getNum(t[F.expense]), getNum(t[F.supplyAmt]), getNum(t[F.costAmt]),
      getLV(t[F.urgent]).some(s=>String(s).includes('긴급'))?'긴급':'일반',
      isUninput(t)?'미입하':'정상',
      getStr(t[F.rework])||'없음', pt.goods_category||''
    ]);
  });

  // Sheet 2: 매출 raw
  const s2rows=[['주차','굿즈명','주문수량','매출총액','매출원가','발주일자']];
  curO.forEach(o=>{
    s2rows.push([wk, o[F.goodsName]||'', getNum(o[F.salesQty]), getNum(o[F.salesAmt]), getNum(o[F.costOrder]), o[F.orderDate]||'']);
  });

  // Sheet 3: 품절 현황
  const s3rows=[['파츠명','판매상태','품절위험','협력사재고','총재고','재입고예정일']];
  state.parts.forEach(p=>{
    const st=getLV(p[F.saleStatus]);
    const risk=getLV(p[F.stockRisk]);
    s3rows.push([getStr(p[F.partsName])||'', st.join('/')||'', risk.some(s=>s===true||String(s)==='true')?'위험':'정상', getNum(p[F.partnerStk]), getNum(p[F.totalStk]), p[F.restockDate]||'']);
  });

  // Sheet 4: 전주/전년 비교
  const s4rows=[['구분','발주건수','총지출액','긴급건수','미입하건수']];
  const sumE=arr=>arr.reduce((s,t)=>s+getNum(t[F.expense]),0);
  const urg =arr=>arr.filter(r=>getLV(r[F.urgent]).some(s=>String(s).includes('긴급'))).length;
  const uni =arr=>arr.filter(isUninput).length;
  s4rows.push(['당주',curT.length,sumE(curT),urg(curT),uni(curT)]);
  s4rows.push(['전주',prevT.length,sumE(prevT),urg(prevT),uni(prevT)]);
  s4rows.push(['전년동주',yoyT.length,sumE(yoyT),urg(yoyT),uni(yoyT)]);

  // Excel XML 생성
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" ';
  xml += 'xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n';

  const makeSheet = (name, rows) => {
    let s = `<Worksheet ss:Name="${name.replace(/&/g,'&amp;')}">\n<Table>\n`;
    rows.forEach((row,ri)=>{
      s += '<Row>';
      row.forEach(cell=>{
        const esc = String(cell==null?'':cell).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const typ = (ri>0 && typeof cell==='number') ? 'Number' : 'String';
        const style = ri===0 ? ' ss:StyleID="hdr"' : '';
        s += `<Cell${style}><Data ss:Type="${typ}">${esc}</Data></Cell>`;
      });
      s += '</Row>\n';
    });
    s += '</Table>\n</Worksheet>\n';
    return s;
  };

  xml += '<Styles><Style ss:ID="hdr"><Font ss:Bold="1"/><Interior ss:Color="#1a2744" ss:Pattern="Solid"/><Font ss:Color="#FFFFFF" ss:Bold="1"/></Style></Styles>\n';
  xml += makeSheet(`발주RAW_${wk}`, s1rows);
  xml += makeSheet(`매출RAW_${wk}`, s2rows);
  xml += makeSheet(`품절현황`, s3rows);
  xml += makeSheet(`전주전년비교_${wk}`, s4rows);
  xml += '</Workbook>';

  const blob = new Blob(['﻿'+xml], {type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`scm_raw_${wk}.xls`;
  a.click();
}

// ──────────────────── MD 내보내기 ────────────────────
function exportMD() {
  if(!state.loaded){alert('먼저 조회를 실행하세요.');return;}
  const wk=state.week, r=isoWeekRange(wk);
  const pwk=prevWeek(wk), ywk=yoyWeek(wk);
  const cur=weekSlice(state.tasks,wk,F.taskDate);
  const prev=weekSlice(state.tasks,pwk,F.taskDate);
  const yoy=weekSlice(state.tasks,ywk,F.taskDate);
  const curO=weekSlice(state.orders,wk,F.orderDate);
  const sumE=arr=>arr.reduce((s,t)=>s+getNum(t[F.expense]),0);
  const sumS=arr=>arr.reduce((s,o)=>s+getNum(o[F.salesAmt]),0);
  const isUrgent=r=>getLV(r[F.urgent]).some(s=>String(s).includes('긴급'));
  const isUninput=r=>{const v=r[F.uninput];return v&&v.linkedRecordIds&&v.linkedRecordIds.length>0;};

  const exp=sumE(cur),pExp=sumE(prev),yExp=sumE(yoy);
  const sales=sumS(curO);
  const urg=cur.filter(isUrgent).length, uni=cur.filter(isUninput).length;

  const wow=(a,b)=>b>0?`${((a-b)/b*100>0?'+':'')}${((a-b)/b*100).toFixed(1)}%`:'N/A';

  const md=`---
date: ${new Date().toISOString().slice(0,10)}
iso_week: ${wk}
type: weekly_scm_kpi_report_v2
---

# SCM 주간 KPI 리포트 — ${wk}

> 기간: ${fmtD(r.start)} ~ ${fmtD(r.end)}  
> 비교: 전주(${pwk}) / 전년동주(${ywk})  
> 생성: ${new Date().toLocaleString('ko-KR')}

---

## ■ 발주 KPI 요약

| 항목 | 당주 | 전주 | 전년동주 | WoW | YoY |
|---|---|---|---|---|---|
| 발주 TASK | ${cur.length}건 | ${prev.length}건 | ${yoy.length}건 | ${wow(cur.length,prev.length)} | ${wow(cur.length,yoy.length)} |
| 총 지출액(VAT) | ${exp.toLocaleString()}원 | ${sumE(prev).toLocaleString()}원 | ${sumE(yoy).toLocaleString()}원 | ${wow(exp,pExp)} | ${wow(exp,yExp)} |
| 총 매출액 | ${sales.toLocaleString()}원 | — | — | — | — |
| 긴급건수 | ${urg}건 | ${prev.filter(isUrgent).length}건 | ${yoy.filter(isUrgent).length}건 | ${wow(urg,prev.filter(isUrgent).length)} | ${wow(urg,yoy.filter(isUrgent).length)} |
| 미입하 발생 | ${uni}건 | ${prev.filter(isUninput).length}건 | ${yoy.filter(isUninput).length}건 | ${wow(uni,prev.filter(isUninput).length)} | — |

## ■ 품절 현황 (v1.1 기준: 일시품절 + 의도적 품절)

- 품절 파츠: ${state.parts.filter(p=>{const v=getLV(p[F.saleStatus]);return v.some(s=>s==='일시품절'||s==='의도적 품절');}).length}종
- 품절위험 파츠: ${state.parts.filter(p=>getLV(p[F.stockRisk]).some(s=>s===true||String(s)==='true')).length}종

## ■ 하도급 90일 미지급

- 90일 초과 미지급 건수: ${(()=>{const today=new Date();const cut90=new Date(today);cut90.setDate(today.getDate()-90);return state.tasks.filter(t=>{const td=t[F.taskDate];if(!td)return false;if(new Date(td)>=cut90)return false;const expLinks=t[F.expenseLink];const hasExp=expLinks&&(Array.isArray(expLinks)?expLinks.length>0:(expLinks.linkedRecordIds&&expLinks.linkedRecordIds.length>0));if(hasExp)return false;const billing=t['fldl2IxTwmFHnnicZ'];const billingVals=getLV(billing);if(billingVals.some(v=>String(v).includes('대상아님')))return false;return true;}).length;})()}건

---
*Generated by SCM KPI Dashboard v2*
`;
  const blob=new Blob([md],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`scm_kpi_report_${wk}.md`;
  a.click();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}
